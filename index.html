<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>สั่งอาหาร - The Gourmet AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="header">
        <h2>The Gourmet AI</h2>
        <div class="table-badge" id="display-table">โต๊ะ --</div>
        <button class="btn-history" onclick="showHistory()"><i class="fa-solid fa-clock-rotate-left"></i> ประวัติ</button>
    </div>

    <div class="ai-section">
        <div class="ai-title"><i class="fa-solid fa-robot"></i> ผู้ช่วยแนะนำอาหาร (AI Waiter)</div>
        <div class="ai-input-group">
            <input type="text" id="ai-input-text" class="ai-input" placeholder="เช่น สูง 170 หนัก 75 อยากคุมน้ำหนัก ทานอะไรดี?">
            <button class="ai-btn" onclick="askAI()"><i class="fa-solid fa-paper-plane"></i></button>
        </div>
        <div id="ai-response-box" style="display: none; margin-top: 15px; padding: 15px; background: white; border-radius: 8px; font-size: 0.9rem; color: #333; line-height: 1.5;">
        </div>
    </div>

    <div class="category-tabs">
        <div id="category-buttons-container" style="display: flex; gap: 10px; overflow-x: auto; margin-bottom: 20px; padding-bottom: 5px;">
    </div>
    </div>

    <div class="menu-container" id="menu-list">
        </div>

    <div class="floating-cart" id="floating-cart" style="display: none;" onclick="openCart()">
        <div id="cart-summary"></div>
    </div>

    <div class="cart-modal" id="cart-modal">
        <div class="cart-content">
            <div class="cart-header">
                <h2>รายการอาหารของคุณ</h2>
                <span class="close-cart" onclick="closeCart()"><i class="fa-solid fa-xmark"></i> ปิด</span>
            </div>
            <div id="cart-items-container">
                </div>
            <div style="display: flex; justify-content: space-between; font-size: 1.2rem; font-weight: bold; margin-top: 15px;">
                <span>ยอดรวมทั้งหมด:</span>
                <span id="cart-total-price">฿ 0</span>
            </div>
            <button class="confirm-order-btn" onclick="submitOrder()">ส่งออเดอร์เข้าครัว</button>
        </div>
    </div>



    <div class="cart-modal" id="item-detail-modal" style="z-index: 1000;">
        <div class="cart-content" style="max-width: 450px;">
            <div class="cart-header">
                <h2 id="detail-name">ชื่อเมนู</h2>
                <span class="close-cart" onclick="closeItemDetail()"><i class="fa-solid fa-xmark"></i></span>
            </div>
            <img id="detail-img" src="" style="width: 100%; height: 200px; object-fit: cover; border-radius: 12px; margin-bottom: 15px;">
            <p id="detail-desc" style="color: #666; font-size: 0.95rem; margin-bottom: 10px;"></p>
            <div id="detail-dynamic-options" style="margin-bottom: 15px;"></div>
            <div style="font-size: 1.3rem; font-weight: bold; color: #0A66C2; margin-bottom: 20px;" id="detail-price">฿ 0</div>
            
            <div style="margin-bottom: 20px;">
                <label style="font-weight: bold; display: block; margin-bottom: 8px; color: #333;">📝 หมายเหตุถึงร้าน (ถ้ามี)</label>
                <textarea id="detail-note" style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ddd; outline: none; font-family: 'Prompt';" rows="3" placeholder="เช่น ไม่ใส่ผัก, เผ็ดน้อย, ขอช้อนส้อม..."></textarea>
            </div>

            <button class="confirm-order-btn" onclick="confirmAddToCart()">+ เพิ่มลงตะกร้า</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore-compat.js"></script>

    <script src="js/data.js"></script>
    <script src="js/app.js"></script>


</body>
</html>
