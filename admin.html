<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบหลังร้าน - The Gourmet AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="kitchen-body">
    <div class="kitchen-header">
        <h1>⚙️ ระบบจัดการหลังร้าน (Admin)</h1>
        <a href="index.html" style="color: #00B4D8; text-decoration: none; font-weight: bold;"><i class="fa-solid fa-store"></i> ดูหน้าร้าน</a>
    </div>

    <div class="admin-container">
        <div class="admin-table-card">
            <h2>💰 จัดการโต๊ะ & เช็คบิล</h2>
            <div id="active-tables-list">
                </div>
        </div>
        
        <div class="admin-table-card" style="background: #121212; color: white; text-align: center;">
            <h2 style="color: #aaa; border-bottom: 1px solid #333;">📊 สรุปรายได้วันนี้</h2>
            <h1 id="daily-income-display" style="color: #00e676; font-size: 3rem; margin: 20px 0;">฿ 0</h1>
            <button onclick="clearDailySales()" style="background: #dc3545; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold;"><i class="fa-solid fa-rotate-right"></i> ล้างข้อมูลเริ่มวันใหม่</button>
        </div>
    </div>

    <div class="admin-container" style="margin-top: 0;">
        <div class="admin-form-card">
            <h2><i class="fa-solid fa-plus"></i> เพิ่ม/แก้ไข เมนู</h2>
            <form id="menu-form">
                <input type="hidden" id="menu-id">
                
                <label>ชื่ออาหาร</label>
                <input type="text" id="menu-name" class="admin-input" required>
                
                <label>รายละเอียด</label>
                <input type="text" id="menu-desc" class="admin-input" required>
                
                <label>ราคา (บาท)</label>
                <input type="number" id="menu-price" class="admin-input" required>
                
                <label>หมวดหมู่</label>
                <select id="menu-category" class="admin-input">
                    <option value="main">จานหลัก</option>
                    <option value="healthy">สายสุขภาพ</option>
                </select>
                
                <label>ลิงก์รูปภาพ (URL หรือ ชื่อไฟล์)</label>
                <input type="text" id="menu-image" class="admin-input" placeholder="เช่น images/food1.jpg" required>
                
                <button type="submit" class="confirm-order-btn" id="submit-btn">บันทึกเมนู</button>
                <button type="button" class="btn-cancel" id="cancel-btn" style="display: none;" onclick="resetForm()">ยกเลิกการแก้ไข</button>
            </form>
        </div>

        <div class="admin-table-card">
            <h2>เมนูอาหารทั้งหมด</h2>
            <div id="admin-menu-list"></div>
        </div>
    </div>

    <script src="js/data.js"></script>
    <script src="js/admin.js"></script>
</body>
</html>
